services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-creactive}
      MARIADB_USER: ${WORDPRESS_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
      MARIADB_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.8-php8.3-apache
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-creactive}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes/creactive-woo:/var/www/html/wp-content/themes/creactive-woo
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./data:/opt/project-data

  wpcli:
    image: wordpress:cli-php8.3
    depends_on:
      - wordpress
      - db
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-creactive}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes/creactive-woo:/var/www/html/wp-content/themes/creactive-woo
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./data:/opt/project-data
      - ./scripts:/opt/project-scripts
    working_dir: /var/www/html

volumes:
  db_data:
  wordpress_data:
